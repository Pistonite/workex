[package]
name = "workex"
version = "0.1.6"
edition = "2024"
description = "In-house messaging bindgen library for workers/windows"
repository = "https://github.com/Pistonite/workex"
license = "MIT"
publish = false
authors = ["Pistonight <pistonknight@outlook.com>"]
exclude = [
    "Taskfile.yml",
]

[dependencies.cu]
package = "pistonite-cu"
version = "0.7.4"
features = ["cli", "fs", "derive"]

[dependencies]
codize = "0.3.3"
swc_common = { version = "19.0.0", features = ["tty-emitter"] }
swc_core = { version = "58.0.4", features = ["ecma_ast"] }
swc_ecma_parser = "35.0.0"

[package.metadata.binstall.signing]
algorithm = "minisign"
pubkey = "RWThJQKJaXayoZBe0YV5LV4KFkQwcqQ6Fg9dJBz18JnpHGdf/cHUyKs+"
