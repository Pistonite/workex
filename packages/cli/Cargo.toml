[package]
name = "workex"
version = "0.1.4"
edition = "2024"
description = "In-house messaging bindgen library for workers/windows"
repository = "https://github.com/Pistonite/workex"
license = "MIT"
authors = ["Pistonight <pistonknight@outlook.com>"]
exclude = [
    "Taskfile.yml",
]

[dependencies.cu]
version = "0.2.1"
git = "https://github.com/Pistonight/cu"
features = ["cli", "fs"]

[dependencies]
clap = { version = "4.5.42", features = ["derive"] }
codize = "0.3.3"
derive_more = { version = "2.0.1", features = ["deref", "deref_mut"] }
swc_common = { version = "14.0.2", features = ["tty-emitter"] }
swc_core = { version = "34.0.4", features = ["ecma_ast"] }
swc_ecma_parser = "22.0.3"

[package.metadata.binstall.signing]
algorithm = "minisign"
pubkey = "RWThJQKJaXayoZBe0YV5LV4KFkQwcqQ6Fg9dJBz18JnpHGdf/cHUyKs+"
