name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: blacksmith-4vcpu-ubuntu-2404
            target: x64
          - image: blacksmith-4vcpu-ubuntu-2404-arm
            target: arm64
          - image: blacksmith-6vcpu-macos-latest
            target: arm64
          - image: blacksmith-4vcpu-windows-2025
            target: x64
    runs-on: ${{ matrix.image }}
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          mono-dev: false
          rust: stable
          rust-native: ${{ matrix.target }}
      - uses: Pistonight/mono-dev/actions/rust-xplat@main
        with:
          arch: ${{ matrix.target }}
          binary: workex

  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          mono-dev: false
          rust: stable
          ecma-pnpm: true
      - run: pnpm install
      - run: task post-install
      - run: task check
      - run: task test

  docs:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          mono-dev: false
          rust: stable
          ecma-pnpm: true
          tool-mdbook: true
          tool-cargo-install: txtpp
      - run: pnpm install
      - run: task post-install
      - run: task build-doc
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: packages/doc/book
          retention-days: 3

  deploy-docs:
    name: deploy-docs
    needs:
      - docs
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
